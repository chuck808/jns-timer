; PlatformIO Project Configuration File
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-stamps3]
; Pinned to the 2.x core (arduino-esp32 2.0.17). This code uses the 2.x
; LEDC API (ledcSetup/ledcAttachPin/ledcWrite(channel,...)) in SensorManager
; and the 2-arg esp_task_wdt_init() in main.cpp; both were changed in the 3.x
; core. Pinning here keeps the existing code compiling unchanged.
platform = espressif32@^6.11.0
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    ; --- Add these for Serial Monitoring ---
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; --- Set PSRAM type for S3 ---
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
lib_deps =
    fastled/FastLED @ ^3.7.0
    m5stack/M5Unified @ ^0.2.13
    m5stack/M5PM1 @ ^1.0.6
board_build.partitions = default_8MB.csv
